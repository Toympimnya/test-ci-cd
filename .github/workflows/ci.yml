name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: test

jobs:
  unit-tests:
    name: Unit | Node ${{ matrix.node }} | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload unit allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-unit-${{ matrix.os }}-node-${{ matrix.node }}
          path: allure-results/
          if-no-files-found: warn

  api-tests:
    name: API | Node ${{ matrix.node }} | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000/health
        shell: bash

      - name: Run API tests
        run: npm run test:api

      - name: Upload API allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-api-${{ matrix.os }}-node-${{ matrix.node }}
          path: allure-results/
          if-no-files-found: warn

  ui-tests:
    name: UI | Node ${{ matrix.node }} | ${{ matrix.os }} | ${{ matrix.browser }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
        if: matrix.os == 'ubuntu-latest'

      - name: Install Playwright browsers (non-Linux)
        run: npx playwright install ${{ matrix.browser }}
        if: matrix.os != 'ubuntu-latest'

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000/health
        shell: bash

      - name: Run UI tests
        run: npm run test:ui -- --project=${{ matrix.browser }}

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-ui-${{ matrix.os }}-${{ matrix.browser }}-node-${{ matrix.node }}
          path: allure-results/
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-${{ matrix.os }}-${{ matrix.browser }}-node-${{ matrix.node }}
          path: playwright-report/
          if-no-files-found: warn

  allure-report:
    name: Build Allure report
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Merge Allure result files
        run: |
          mkdir -p merged-allure-results
          find all-artifacts -type f \( -name "*.json" -o -name "*.txt" -o -name "*.xml" -o -name "*.png" -o -name "*.webm" -o -name "*.zip" \) -exec cp {} merged-allure-results/ \;

      - name: Generate Allure report
        run: npx allure generate merged-allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: warn

      - name: Deploy Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}

  notify:
    name: Telegram notify
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, allure-report]
    if: always()
    steps:
      - name: Set message text
        id: msg
        run: |
          if [ "${{ needs.unit-tests.result }}" = "success" ] && [ "${{ needs.api-tests.result }}" = "success" ] && [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "text=✅ CI passed for ${{ github.repository }} | run #${{ github.run_number }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "text=❌ CI failed for ${{ github.repository }} | run #${{ github.run_number }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not set. Skipping notification."
            exit 0
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${{ steps.msg.outputs.text }}"
